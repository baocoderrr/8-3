  background:linear-gradient(90deg,transparent,rgba(60,20,0,.55) 8%,rgba(40,15,0,.65) 92%,transparent);}
.bulb{position:absolute;width:9px;height:11px;border-radius:50% 50% 42% 42%;top:9px;
  transform:translateX(-50%);
  animation:blink var(--d,2s) ease-in-out infinite var(--dl,0s);
  box-shadow:0 0 8px var(--c),0 0 18px var(--c);}
.bulb::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:4px;height:5px;background:rgba(50,20,5,.8);border-radius:2px 2px 0 0;}
@keyframes blink{
  0%,100%{opacity:.25;transform:translateX(-50%) scale(1);}
  50%{opacity:1;transform:translateX(-50%) scale(1.15);}
}

/* ── DECO birds & flowers ── */

/* ── HEADER ── */
#header{position:relative;z-index:10;text-align:center;padding:58px 20px 10px;}
#header h1{
  font-family:'Dancing Script',cursive;
  font-size:clamp(52px,10vw,110px);
  color:#fff;font-weight:700;line-height:1.05;
  text-shadow:0 3px 18px rgba(0,0,0,.55),0 0 50px rgba(255,120,100,.4),0 1px 0 rgba(0,0,0,.3);
}
#header h1 em{color:#ffd0e0;font-style:italic;}
.sub{
  margin-top:3px;
  font-size:clamp(9px,1.4vw,11px);
  color:rgba(255,220,230,.65);letter-spacing:4px;text-transform:uppercase;
}
.instr{
  display:inline-block;margin-top:10px;
  background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.4);
  backdrop-filter:blur(8px);border-radius:99px;padding:7px 20px;
  font-size:clamp(11px,1.8vw,13px);color:#fff;letter-spacing:.4px;
}
#prog{margin-top:7px;font-size:11px;color:rgba(255,215,225,.55);}
#prog span{color:#fff;font-weight:700;}

/* ── WALL ── */
#wall{position:relative;z-index:10;max-width:1400px;margin:0 auto;padding:4px 18px 90px;}

.cl-row{position:relative;margin-bottom:40px;}
.cl-row::before{
  content:'';position:absolute;top:4px;left:-10px;right:-10px;height:2px;
  background:linear-gradient(90deg,transparent,rgba(70,20,5,.45) 8%,rgba(50,15,3,.6) 92%,transparent);
}
.row-cards{
  display:grid;
  grid-template-columns:repeat(var(--cols,7),1fr);
  gap:12px;padding-top:18px;
}

/* ── CARD ── */
.cw{position:relative;cursor:pointer;transition:transform .22s ease;}
.cw:hover{transform:translateY(-7px) scale(1.06);}
.cw:hover .card{box-shadow:0 14px 44px rgba(190,50,70,.55),0 4px 14px rgba(0,0,0,.45);}

/* Clothespin */
.cw::before{
  content:'';position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:8px;height:17px;
  background:linear-gradient(180deg,#a07c22,#6b4f10);
  border-radius:3px 3px 2px 2px;box-shadow:1px 1px 4px rgba(0,0,0,.55);z-index:5;
}
.cw::after{
  content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);
  width:13px;height:4px;background:#b89030;border-radius:3px;z-index:6;
}

.card{
  width:100%;border-radius:10px;overflow:hidden;
  box-shadow:3px 6px 22px rgba(0,0,0,.42);
  border:2px solid rgba(255,220,175,.6);
  animation:sway var(--sw,3.2s) ease-in-out infinite var(--sd,0s);
  transform-origin:top center;
  display:flex;flex-direction:column;
  min-height:140px;
  background:linear-gradient(155deg,var(--c1,#fff9f0),var(--c2,#ffead8));
  transition:border-color .3s;
}
@keyframes sway{
  0%,100%{transform:rotate(var(--ra,-2.5deg));}
  50%{transform:rotate(var(--rb,2.5deg));}
}
.cw:hover .card{animation:none;transform:rotate(0);}
.cw.opened .card{
  border-color:rgba(210,80,110,.5);
  background:linear-gradient(155deg,#fff0f5,#ffd8ea);
}

.card-label{
  flex:1;padding:13px 8px 11px;text-align:center;
  display:flex;flex-direction:column;gap:5px;
  align-items:center;justify-content:center;
}
.card-name{
  font-family:'Dancing Script',cursive;
  font-size:clamp(15px,1.35vw,21px);
  font-weight:700;color:#6b1a2a;line-height:1.15;
}
.card-zodiac{
  font-size:clamp(8px,.8vw,10px);color:#8b3a4a;font-weight:700;
  background:rgba(200,75,95,.1);border:1px solid rgba(200,75,95,.22);
  border-radius:99px;padding:2px 8px;white-space:nowrap;
}
.card-tap{
  font-size:8px;color:#a05060;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;
  animation:tapP 1.6s ease-in-out infinite;
}
@keyframes tapP{0%,100%{opacity:.45;}50%{opacity:1;}}

/* Card open burst effect */
@keyframes cardBurst{
  0%{transform:scale(1);}
  30%{transform:scale(1.12);}
  60%{transform:scale(.97);}
  100%{transform:scale(1);}
}
.cw.just-opened .card{animation:cardBurst .5s ease forwards;}

/* ════════════════════════════════════════
   MODAL — 3 SLIDES
════════════════════════════════════════ */
#modal{
  position:fixed;inset:0;z-index:5000;
  background:rgba(4,1,12,0);backdrop-filter:blur(0px);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;padding:10px;
  transition:background .35s ease,backdrop-filter .35s ease;
}
#modal.show{
  background:rgba(4,1,12,.9);backdrop-filter:blur(24px);
  pointer-events:all;
}

.mc{
  width:min(92vw,900px);
  max-height:86vh;
  height:86vh;
  border-radius:22px;overflow:hidden;
  box-shadow:0 0 90px rgba(220,120,60,.45),0 28px 64px rgba(0,0,0,.75);
  transform:scale(.68) translateY(60px) rotate(-2deg);opacity:0;
  transition:transform .48s cubic-bezier(.34,1.56,.64,1),opacity .36s ease;
  position:relative;display:flex;flex-direction:column;
}
#modal.show .mc{transform:scale(1) translateY(0) rotate(0deg);opacity:1;}

/* Slide track */
.mc-slides{
  display:flex;width:300%;flex:1;min-height:0;
  transition:transform .42s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.mc-slide{width:33.333%;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
/* Slide 1: photo fills full, text overlays */
.mc-slide:first-child{flex-direction:column;position:relative;}

/* Close btn */
.mc-close{
  position:absolute;top:10px;right:10px;z-index:20;
  width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,.22);border:none;color:#fff;
  font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s;backdrop-filter:blur(4px);
}
.mc-close:hover{background:rgba(0,0,0,.42);transform:rotate(90deg);}

/* ── Slide 1: Photo + Message ── */
.mc-photo{
  width:100%;flex-shrink:0;
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#fde8f0,#fac8d8);
  aspect-ratio:unset;max-height:none;height:100%;
}
.mc-photo img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center top;display:block;
}
.mcp-ph{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:60px;
  background:linear-gradient(135deg,var(--pc1,#fde8f0),var(--pc2,#f9c8dc));
}

.mc-info{
  position:absolute;bottom:44px;right:0;
  width:42%;max-width:320px;
  padding:22px 26px 20px;
  display:flex;flex-direction:column;gap:10px;
  justify-content:flex-end;
  background:linear-gradient(135deg,rgba(255,248,242,.92),rgba(253,232,216,.95));
  backdrop-filter:blur(12px);
  border-radius:18px 0 0 18px;
  box-shadow:-4px 4px 24px rgba(0,0,0,.12);
  z-index:5;
  border-left:none;border-right:none;
}
.mc-info::after{
  content:'✿';position:absolute;bottom:-12px;right:10px;
  font-size:72px;color:rgba(210,80,120,.05);pointer-events:none;
}
.mc-date{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:#c89878;font-weight:700;}
.mc-name{
  font-family:'Dancing Script',cursive;
  font-size:clamp(26px,2.8vw,38px);font-weight:700;color:#6b1a2a;line-height:1.1;
}
.mc-div{width:36px;height:2.5px;background:linear-gradient(90deg,#e86040,#ffaa70);border-radius:99px;}
.mc-msg{
  font-size:clamp(12px,1.2vw,15px);color:#7a3020;
  line-height:1.75;font-style:italic;font-weight:400;
}

/* ── Slide 2: Quote ── */
.mc-quote-slide{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 80px 70px;gap:16px;
  overflow-y:auto;
  background:linear-gradient(160deg,#fff0f5,#fde8f0,#fff0f5);
  position:relative;overflow:hidden;text-align:center;
}
.mc-quote-slide::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 22% 32%,rgba(230,100,140,.15) 0%,transparent 52%),
    radial-gradient(ellipse at 78% 68%,rgba(220,80,120,.1) 0%,transparent 52%);
}
.q-label{
  font-size:13px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(180,60,80,.7);font-weight:700;position:relative;z-index:1;
}
.q-emoji-big{
  font-size:48px;position:relative;z-index:1;
  animation:floatE 3.2s ease-in-out infinite;
}
@keyframes floatE{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
.q-open,.q-close-quote{
  font-size:48px;color:rgba(180,60,80,.18);
  line-height:0;position:relative;z-index:1;
}
.q-open{align-self:flex-start;margin-bottom:-6px;}
.q-close-quote{align-self:flex-end;margin-top:-6px;}
.q-text{
  font-size:clamp(16px,1.6vw,22px);color:#7a2035;
  line-height:1.9;font-style:italic;
  position:relative;z-index:1;max-width:580px;
}
.q-name{
  font-family:'Dancing Script',cursive;
  font-size:19px;font-weight:700;color:#c84060;
  position:relative;z-index:1;
}
.q-star{
  position:absolute;border-radius:50%;background:rgba(220,80,120,.35);pointer-events:none;
  animation:twk var(--d,2s) ease-in-out infinite var(--dl,0s);
  background:rgba(220,80,120,.35);
}
@keyframes twk{0%,100%{opacity:.06;}50%{opacity:.55;}}

/* ── Slide 3: Gift ── */
.mc-gift-slide{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 80px 70px;gap:18px;
  overflow-y:auto;
  background:linear-gradient(160deg,#fff5ee,#fde0cc,#fff8f2);
  position:relative;overflow:hidden;text-align:center;
}
.mc-gift-slide::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 15%,rgba(240,140,80,.15) 0%,transparent 58%);
}
.gift-label{
  font-size:13px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(180,90,50,.7);font-weight:700;position:relative;z-index:1;
}
/* Gift photo frame — matches photo slide proportions */
.gift-photo{
  width:min(55%,260px);
  aspect-ratio:3/4;
  border-radius:14px;overflow:hidden;
  position:relative;z-index:1;
  background:linear-gradient(135deg,var(--pc1,#fde8f0),var(--pc2,#f9c8dc));
  box-shadow:0 10px 28px rgba(200,55,95,.22),0 2px 8px rgba(0,0,0,.1);
  border:2px solid rgba(220,95,130,.18);
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
}
.gift-photo img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center center;display:block;
}
.gift-ph-emoji{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;font-size:48px;
}
.gift-sublabel{display:none;}
.gift-item-name{
  font-family:'Dancing Script',cursive;
  font-size:clamp(28px,3vw,44px);font-weight:700;color:#6b2810;
  position:relative;z-index:1;line-height:1.2;
}
.gift-person{
  font-family:'Dancing Script',cursive;
  font-size:15px;color:#b06030;position:relative;z-index:1;
}
.g-spark{
  position:absolute;pointer-events:none;font-size:11px;
  animation:gspk var(--d,2s) ease-in-out infinite var(--dl,0s);opacity:0;
}
@keyframes gspk{0%,100%{opacity:0;transform:scale(.4) rotate(0deg);}50%{opacity:.9;transform:scale(1.1) rotate(20deg);}}

/* ── Dots ── */
.mc-bottom{
  position:absolute;bottom:0;left:0;right:0;height:36px;
  display:flex;align-items:center;justify-content:center;gap:7px;
  z-index:15;pointer-events:none;
  background:linear-gradient(transparent,rgba(0,0,0,.07));
}
.mc-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(200,75,115,.18);border:2px solid rgba(200,75,115,.32);
  transition:all .32s cubic-bezier(.4,0,.2,1);
  cursor:pointer;pointer-events:all;padding:0;
}
.mc-dot.active{
  width:24px;border-radius:99px;
  background:linear-gradient(90deg,#e86040,#ffaa70);
  border-color:transparent;
  box-shadow:0 0 8px rgba(220,55,85,.48);
}

/* Next button */
.next-btn{
  position:absolute;bottom:10px;right:14px;
  display:flex;align-items:center;gap:6px;
  z-index:16;
  background:linear-gradient(135deg,#e86040,#ffaa70);
  border:none;border-radius:99px;padding:8px 18px;
  color:#fff;font-size:12px;font-family:'Be Vietnam Pro',sans-serif;
  font-weight:700;letter-spacing:1px;cursor:pointer;
  box-shadow:0 4px 14px rgba(220,80,40,.35);
  transition:transform .18s,box-shadow .18s,opacity .3s;
}
.next-btn:hover{transform:scale(1.06);box-shadow:0 6px 20px rgba(220,80,40,.5);}
.next-btn.hidden{opacity:0;pointer-events:none;}
.next-ico{font-size:16px;line-height:1;}

/* ════════════════════════════════════════
   CONFETTI + DONE
════════════════════════════════════════ */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:6000;}
#done{
  display:none;position:fixed;inset:0;z-index:7000;
  background:rgba(4,1,12,.93);backdrop-filter:blur(20px);
  align-items:center;justify-content:center;
  flex-direction:column;gap:16px;text-align:center;padding:24px;
}
#done.show{display:flex;animation:fi .8s ease;}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
#done h2{
  font-family:'DM Serif Display',serif;
  font-size:clamp(28px,5vw,54px);
  color:#fde8f0;text-shadow:0 0 44px rgba(220,95,140,.6);
}
#done h2 em{color:#ffb5ca;}
#done p{font-size:13px;color:#cc8aa8;letter-spacing:2px;}
#done button{
  margin-top:8px;padding:12px 32px;
  background:linear-gradient(135deg,#e84070,#ff9090);
  border:none;border-radius:99px;
  color:#fff;font-size:14px;font-family:'Be Vietnam Pro',sans-serif;font-weight:700;
  cursor:pointer;letter-spacing:1px;transition:transform .2s;
}
#done button:hover{transform:scale(1.07);}

/* ════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════ */

/* Mobile ≤ 480px */
@media(max-width:480px){
  body::before{background-position:center 30%;}
  #header{padding:48px 12px 8px;}
  #header h1{font-size:clamp(38px,11vw,52px);}
  .sub{font-size:8px;letter-spacing:3px;}
  .instr{font-size:10px;padding:6px 14px;}
  #prog{font-size:10px;}

  #wall{padding:4px 8px 70px;}
  .cl-row{margin-bottom:28px;}
  .row-cards{
    grid-template-columns:repeat(4,1fr)!important;
    gap:7px;padding-top:14px;
  }
  .card{min-height:82px;border-radius:7px;}
  .card-label{padding:8px 4px;gap:4px;}
  .card-name{font-size:clamp(12px,3.5vw,15px);}
  .card-zodiac{font-size:7px;padding:1px 5px;}
  .card-tap{font-size:7px;}
  .cw::before{width:6px;height:13px;top:-10px;}
  .cw::after{width:10px;height:3px;top:-4px;}

  /* Modal full-width on mobile */
  .mc{width:96vw;border-radius:18px;}
  .mc-photo{max-height:44vh;}
  .mc-quote-slide{padding:24px 18px 40px;gap:11px;}
  .q-text{font-size:13px;}
  .mc-gift-slide{padding:20px 18px 40px;gap:11px;}
  .gift-photo{width:min(65%,160px);}
}

/* Small mobile ≤ 360px — 3 columns */
@media(max-width:360px){
  .row-cards{
    grid-template-columns:repeat(3,1fr)!important;
    gap:6px;
  }
  .card-name{font-size:12px;}
}

/* Tablet 481–768px */
@media(min-width:481px) and (max-width:768px){
  #header h1{font-size:clamp(44px,9vw,64px);}
  #wall{padding:4px 12px 72px;}
  .row-cards{
    grid-template-columns:repeat(4,1fr)!important;
    gap:10px;
  }
  .card{min-height:110px;}
  .mc{width:min(88vw,500px);}
}

/* Tablet landscape 769–1024px */
@media(min-width:769px) and (max-width:1024px){
  #header h1{font-size:clamp(56px,8vw,80px);}

  <p class="instr">Chọn đúng tấm có tên bạn để mở lời chúc bí mật</p>
  <p id="prog">Đã mở <span id="fc">0</span> / <span id="tc">28</span> tấm</p>
</div>

<div id="wall"></div>

<!-- MODAL -->
<div id="modal">
  <div class="mc">
    <button class="mc-close" id="mc-close">✕</button>
    <div class="mc-slides" id="mc-slides">

      <!-- Slide 1: Ảnh + Lời chúc -->
      <div class="mc-slide">
        <div class="mc-photo" id="mc-photo">
          <div class="mcp-ph" id="mcp-ph">🌸</div>

          <p class="mc-msg" id="mc-msg"></p>
        </div>

      <!-- Slide 2: Quote -->
      <div class="mc-slide">

          <p class="q-label">✦ Dành riêng cho bạn ✦</p>
          <div class="q-emoji-big">🌸</div>
          <div class="q-open">"</div>
          <p class="q-text" id="q-text"></p>
          <div class="q-close-quote">"</div>

          <p class="gift-label">Quà dành cho bạn</p>

            <div class="gift-ph-emoji" id="gift-ph-emoji">🎁</div>

    </div>

    <!-- Next button -->
    <div class="mc-bottom">

<script>
/* ═══════════════════════════════════════════════════════
   DỮ LIỆU — đổi photo:"photos/TenFile.JPG" cho từng người
   gift_photo:"photos/gift_Ten.JPG" nếu có ảnh quà
═══════════════════════════════════════════════════════ */

  ['#fff5ef','#ffe7d4'],['#fff0f5','#ffd4e6'],['#f5f0ff','#e8d4ff'],
  ['#f0fff4','#d4ffe6'],['#ffffe0','#fff4d4'],['#f0f8ff','#d4eeff'],

/* ── Fairy lights ── */
const lightsEl = document.getElementById('lights');
const BC = ['#ff6b6b','#ffd166','#06d6a0','#a855f7','#ec4899','#feca57','#48dbfb','#f4a261'];
for (let i = 2; i <= 98; i += 4) {
  const b = document.createElement('div'); b.className = 'bulb';
  const c = BC[Math.floor(Math.random()*BC.length)];
  b.style.cssText = `left:${i}%;background:${c};--c:${c};--d:${1.4+Math.random()*2.4}s;--dl:${Math.random()*3}s;`;
  lightsEl.appendChild(b);
}

/* ── Build wall ── */
document.getElementById('tc').textContent = PEOPLE.length;
const wall = document.getElementById('wall');
let openedCount = 0, gi = 0;

ROWS.forEach(count => {
  const row = document.createElement('div'); row.className = 'cl-row';
  const rc  = document.createElement('div'); rc.className  = 'row-cards';
  rc.style.setProperty('--cols', count);

  for (let i = 0; i < count && gi < PEOPLE.length; i++, gi++) {
    const g    = PEOPLE[gi];
    const cols = COLORS[gi % COLORS.length];
    const ra   = (Math.random()-.5)*5.5;
    const rb   = (Math.random()-.5)*5.5;

    const cw   = document.createElement('div'); cw.className = 'cw';
    const card = document.createElement('div'); card.className = 'card';
    card.style.cssText =
      `--ra:${ra}deg;--rb:${rb}deg;` +
      `--sw:${2.6+Math.random()*2.4}s;--sd:${Math.random()*4.5}s;` +
      `--c1:${cols[0]};--c2:${cols[1]};`;

    card.innerHTML = `
      <div class="card-label">
        <div class="card-name">${g.name}</div>
        <div class="card-zodiac">${g.zodiac}</div>
        <div class="card-tap">Mở lời chúc</div>
      </div>`;

    cw.appendChild(card);
    rc.appendChild(cw);

    cw.addEventListener('click', () => {
      if (!cw.classList.contains('opened')) {
        cw.classList.add('opened','just-opened');
        setTimeout(() => cw.classList.remove('just-opened'), 600);
        openedCount++;
        document.getElementById('fc').textContent = openedCount;
        fireConfetti(cw);
        if (openedCount >= PEOPLE.length)
          setTimeout(() => { document.getElementById('done').classList.add('show'); bigConfetti(); }, 900);
      }
      openModal(g, cols);
    });
  }
  row.appendChild(rc);
  wall.appendChild(row);
});

for (let i = 0; i < 24; i++) {

  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*3.2}s;--dl:${Math.random()*4}s;`;

}

['✨','💫','🌟','💝','⭐'].forEach((em,idx) => {
  const s = document.createElement('div'); s.className = 'g-spark';
  s.textContent = em;
  s.style.cssText = `left:${10+idx*17}%;top:${15+Math.random()*55}%;--d:${1.4+Math.random()*2}s;--dl:${idx*.4}s;`;

/* ── MODAL ── */
const modal    = document.getElementById('modal');
const mcImg    = document.getElementById('mcp-img');
const mcPh     = document.getElementById('mcp-ph');
const mcSlides = document.getElementById('mc-slides');
const dots     = document.querySelectorAll('.mc-dot');
let curSlide   = 0;

const nextBtn   = document.getElementById('next-btn');
const nextLabel = document.getElementById('next-btn-label');

function goSlide(n) {
  curSlide = n;
  mcSlides.style.transform = `translateX(-${n*33.333}%)`;
  dots.forEach((d,i) => d.classList.toggle('active', i===n));
  if (n >= 2) {
    nextBtn.classList.add('hidden');
  } else {
    nextBtn.classList.remove('hidden');
    nextLabel.textContent = n === 1 ? 'Xem quà 🎁' : 'Tiếp theo';
  }
}

/* Touch swipe */
let tx = 0;
mcSlides.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
mcSlides.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 32) goSlide(Math.max(0, Math.min(2, curSlide + (dx<0?1:-1))));
});
/* Mouse drag */
let mx = 0, dragging = false;
mcSlides.addEventListener('mousedown',  e => { mx = e.clientX; dragging = true; e.preventDefault(); });
window.addEventListener('mouseup',      e => {
  if (!dragging) return; dragging = false;
  const dx = e.clientX - mx;
  if (Math.abs(dx) > 32) goSlide(Math.max(0, Math.min(2, curSlide + (dx<0?1:-1))));
});

function openModal(g, cols) {
  goSlide(0);

  /* Slide 1 */
  document.getElementById('mc-name').textContent = g.name;
  document.getElementById('mc-msg').textContent  = g.msg;
  const photoEl = document.getElementById('mc-photo');
  photoEl.style.setProperty('--pc1', cols[0]);
  photoEl.style.setProperty('--pc2', cols[1]);

  if (g.photo) {
    mcImg.src = g.photo;
    mcImg.style.display = 'block';
    mcPh.style.display  = 'none';
    mcImg.onerror = () => { mcImg.style.display='none'; mcPh.style.display='flex'; };
  } else {
    mcImg.style.display = 'none';
    mcPh.style.display  = 'flex';
  }

  /* Slide 2 */
  document.getElementById('q-text').textContent = g.quote || '';
  document.getElementById('q-name').textContent = '— ' + g.name;

  /* Slide 3 */
  document.getElementById('gift-item').textContent   = g.gift   || 'Bí mật...';

  const gPhotoEl = document.getElementById('gift-photo');
  gPhotoEl.style.setProperty('--pc1', cols[0]);
  gPhotoEl.style.setProperty('--pc2', cols[1]);

  const gImg = document.getElementById('gift-img');
  const gPh  = document.getElementById('gift-ph-emoji');
  if (g.gift_photo) {
    gImg.src = g.gift_photo; gImg.style.display='block'; gPh.style.display='none';
    gImg.onerror = () => { gImg.style.display='none'; gPh.style.display='flex'; };
  } else {
    gImg.style.display = 'none'; gPh.style.display = 'flex'; gPh.textContent = '🎁';
  }

  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modal.classList.remove('show');
  document.body.style.overflow = '';
  setTimeout(() => { mcImg.src = ''; }, 400);
}

document.getElementById('mc-close').onclick = closeModal;
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape')      closeModal();
  if (e.key === 'ArrowRight')  goSlide(Math.min(2, curSlide+1));
  if (e.key === 'ArrowLeft')   goSlide(Math.max(0, curSlide-1));
});

/* ── CONFETTI ── */
const cv  = document.getElementById('confetti');
const ctx = cv.getContext('2d');
function resizeCv() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
resizeCv();
window.addEventListener('resize', resizeCv);

let parts = [];
const CC = ['#e84070','#ff9090','#f4a261','#fde68a','#f9a8d4','#fff','#c084fc','#fca5a5','#86efac'];

function spawnParts(x, y, n, spread=1) {
  for (let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2;
    const sp = (4+Math.random()*8)*spread;
    parts.push({
      x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-(2*spread),
      sz:3+Math.random()*6, color:CC[Math.floor(Math.random()*CC.length)],
      life:1, decay:.012+Math.random()*.01,
      rot:Math.random()*360, rv:(Math.random()-.5)*14,
      rect:Math.random()>.35
    });
  }
}
function fireConfetti(el) {
  const r = el.getBoundingClientRect();
  spawnParts(r.left+r.width/2, r.top+r.height/2, 55);
}
function bigConfetti() {
  for (let i=0; i<300; i++) {
    parts.push({
      x:Math.random()*cv.width, y:-12,
      vx:(Math.random()-.5)*6, vy:2+Math.random()*7,
      sz:4+Math.random()*8, color:CC[Math.floor(Math.random()*CC.length)],
      life:1, decay:.003+Math.random()*.006,
      rot:Math.random()*360, rv:(Math.random()-.5)*10,
      rect:Math.random()>.35
    });
  }
}
(function loop() {
  ctx.clearRect(0,0,cv.width,cv.height);
  parts = parts.filter(p => p.life > 0);
  parts.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=.16; p.vx*=.99;
    p.life-=p.decay; p.rot+=p.rv;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot*Math.PI/180);
    if (p.rect) ctx.fillRect(-p.sz/2,-p.sz/4, p.sz, p.sz/2);
    else { ctx.beginPath(); ctx.arc(0,0,p.sz/2,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });
  requestAnimationFrame(loop);
})();
</script>
